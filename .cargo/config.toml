[build]
target = "aarch64-unknown-none-softfloat"

[target.aarch64-unknown-none-softfloat]
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
]

# Big-endian target — usar via: make be
# Requer nightly: cargo +nightly build -Z build-std=core,compiler_builtins
[target."aarch64_be-unknown-none-softfloat.json"]
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
]